<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https://prafoodapi.onrender.com wss://prafoodapi.onrender.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com data:;"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pratinhopratudo - Agente de Impressão</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #f1f5f9;
        color: #1e293b;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        user-select: none; /* Evita que o operador selecione textos sem querer na tela do app */
      }

      .card {
        width: 100%;
        max-width: 390px;
        background: white;
        border-radius: 22px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      }

      .header {
        text-align: center;
        margin-bottom: 26px;
      }

      .header h1 {
        font-size: 22px;
        color: #ef4444;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .header p {
        margin-top: 8px;
        color: #64748b;
        font-size: 13px;
      }

      .status-box {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 22px;
      }

      .status-title {
        font-size: 11px;
        color: #94a3b8;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
      }

      .online {
        background: #dcfce7;
        color: #166534;
      }

      .offline {
        background: #fee2e2;
        color: #991b1b;
      }

      .mock {
        background: #fef3c7;
        color: #92400e;
      }

      .syncing {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .form-box {
        margin-bottom: 22px;
      }

      .form-box label {
        display: block;
        margin-bottom: 8px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #94a3b8;
      }

      .select-wrapper {
        position: relative;
      }

      .select-wrapper i {
        position: absolute;
        top: 50%;
        left: 14px;
        transform: translateY(-50%);
        color: #64748b;
        font-size: 14px;
        pointer-events: none;
      }

      select {
        width: 100%;
        height: 46px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        padding: 0 14px 0 40px;
        font-size: 13px;
        font-weight: 500;
        color: #1e293b;
        outline: none;
        appearance: none;
        cursor: pointer;
        transition: 0.2s;
      }

      select:focus {
        border-color: #ef4444;
        background: white;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.08);
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      button {
        width: 100%;
        height: 48px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: #0f172a;
        color: white;
      }

      .btn-primary:hover {
        background: #020617;
      }

      .btn-secondary {
        background: white;
        border: 1px solid #cbd5e1;
        color: #334155;
      }

      .btn-secondary:hover {
        background: #f8fafc;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .footer {
        margin-top: 20px;
        text-align: center;
        color: #94a3b8;
        font-size: 11px;
      }

      .footer i {
        margin-right: 4px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="header">
        <h1>
          <i class="fas fa-utensils"></i>
          Pratinhopratudo
        </h1>
        <p>Ponte de Impressão Local (Windows)</p>
      </div>

      <div class="status-box">
        <div class="status-title">Status do Agente</div>
        <div id="status-badge" class="status syncing">
          <i class="fas fa-circle-notch fa-spin"></i>
          Inicializando...
        </div>
      </div>

      <div class="form-box">
        <label>Impressora instalada</label>
        <div class="select-wrapper">
          <i class="fas fa-print"></i>
          <select id="select-impressoras">
            <option value="">Carregando impressoras...</option>
          </select>
        </div>
      </div>

      <div class="buttons">
        <button id="btn-sync" class="btn-primary">
          <i class="fas fa-sync-alt"></i>
          <span>Atualizar Impressoras</span>
        </button>

        <button id="btn-test" class="btn-secondary" disabled>
          <i class="fas fa-print"></i>
          <span>Imprimir Teste</span>
        </button>
      </div>

      <div class="footer">
        <i class="fas fa-lock"></i>
        Mantenha o agente aberto em segundo plano
      </div>
    </div>

    <script>
      const { ipcRenderer } = require("electron");

      const selectImpressoras = document.getElementById("select-impressoras");
      const statusBadge = document.getElementById("status-badge");
      const btnSync = document.getElementById("btn-sync");
      const btnTest = document.getElementById("btn-test");

      document.addEventListener("DOMContentLoaded", () => {
        console.log(
          "✅ HTML renderizado. Aguardando disparo do processo principal do Electron...",
        );
      });

      // ======================================================
      // RECEBER LISTA DO WINDOWS SPOOLER
      // ======================================================
      ipcRenderer.on(
        "lista-impressoras-resposta",
        (event, lista, impressoraSalva) => {
          console.log("🖨️ Lista de impressoras recebida pelo HTML:", lista);

          // Restaura o estado visual original do botão de sincronização
          restaurarBotaoSincronizar();

          selectImpressoras.innerHTML = "";

          if (!Array.isArray(lista) || lista.length === 0) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = "Nenhuma impressora encontrada";
            selectImpressoras.appendChild(option);

            atualizarVisualPagina("mock");
            return;
          }

          const defaultOpt = document.createElement("option");
          defaultOpt.value = "";
          defaultOpt.textContent = "-- Selecione uma impressora --";
          selectImpressoras.appendChild(defaultOpt);

          lista.forEach((printer) => {
            const option = document.createElement("option");
            option.value = printer.name;
            option.textContent =
              printer.name + (printer.isDefault ? " (Padrão do Windows)" : "");

            if (impressoraSalva && printer.name === impressoraSalva) {
              option.selected = true;
            }
            selectImpressoras.appendChild(option);
          });

          if (selectImpressoras.value !== "") {
            atualizarVisualPagina("online");
          } else {
            atualizarVisualPagina("mock");
          }
        },
      );

      // Escuta se a impressão de teste finalizou no backend para reativar o botão
      ipcRenderer.on("teste-impressao-concluido", () => {
        restaurarBotaoTeste();
      });

      // ======================================================
      // ESCUTAR MUDANÇA DE STATUS DO SOCKET
      // ======================================================
      ipcRenderer.on("status-mudou", (event, status) => {
        console.log("🟢 Alteração de status da nuvem recebida:", status);
        atualizarVisualPagina(status);
      });

      // ======================================================
      // SALVAR ALTERAÇÃO DE SELEÇÃO
      // ======================================================
      selectImpressoras.addEventListener("change", () => {
        const nome = selectImpressoras.value;
        // Rastreia a mudança de impressora
        ipcRenderer.send("usuario-clicou", {
          elemento: "select-impressora",
          valor: nome,
        });
        ipcRenderer.send("configurar-impressora-ativa", nome);
      });

      // ======================================================
      // RENDERIZADOR VISUAL INTELIGENTE
      // ======================================================
      function atualizarVisualPagina(estado) {
        if (!statusBadge) return;

        if (
          (estado === "online" || estado === "mock") &&
          (!selectImpressoras || selectImpressoras.value === "")
        ) {
          statusBadge.className = "status mock";
          statusBadge.innerHTML = `<i class="fas fa-vial"></i> Modo simulador`;
          if (btnTest) btnTest.disabled = false;
          return;
        }

        if (estado === "online") {
          statusBadge.className = "status online";
          statusBadge.innerHTML = `<i class="fas fa-check-circle"></i> Spooler Pronto`;
          if (btnTest) btnTest.disabled = false;
          return;
        }

        if (estado === "syncing") {
          statusBadge.className = "status syncing";
          statusBadge.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Atualizando...`;
          if (btnTest) btnTest.disabled = true;
          return;
        }

        statusBadge.className = "status offline";
        statusBadge.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Desconectado`;
        if (btnTest) btnTest.disabled = true;
      }

      // ======================================================
      // INTERAÇÃO DOS BOTÕES (COM DETECÇÃO E BLOQUEIO DE UX)
      // ======================================================
      btnTest.addEventListener("click", () => {
        // 1. Envia sinal de rastreamento pro processo Main do Electron
        ipcRenderer.send("usuario-clicou", {
          elemento: "btn-imprimir-teste",
          impressoraSelecionada: selectImpressoras.value || "Nenhuma/Simulador",
        });

        // 2. Feedback visual: desabilita o botão e põe spinner de loading
        btnTest.disabled = true;
        btnTest.querySelector("i").className = "fas fa-circle-notch fa-spin";
        btnTest.querySelector("span").textContent = "Imprimindo...";

        // 3. Executa a ação real
        ipcRenderer.send("solicitar-teste-impressao");

        // Segurança caso o backend não responda em 5 segundos, reativa o botão
        setTimeout(restaurarBotaoTeste, 5000);
      });

      btnSync.addEventListener("click", () => {
        // 1. Envia sinal de rastreamento pro processo Main do Electron
        ipcRenderer.send("usuario-clicou", {
          elemento: "btn-atualizar-impressoras",
        });

        // 2. Feedback visual
        btnSync.disabled = true;
        btnSync.querySelector("i").className = "fas fa-circle-notch fa-spin";
        btnSync.querySelector("span").textContent = "Buscando...";

        // 3. Executa a ação real
        atualizarVisualPagina("syncing");
        ipcRenderer.send("buscar-lista-impressoras");
      });

      // Funções auxiliares para restaurar o estado dos botões
      function restaurarBotaoTeste() {
        if (!btnTest) return;
        btnTest.disabled =
          selectImpressoras.value === "" &&
          statusBadge.className !== "status mock";
        btnTest.querySelector("i").className = "fas fa-print";
        btnTest.querySelector("span").textContent = "Imprimir Teste";
      }

      function restaurarBotaoSincronizar() {
        if (!btnSync) return;
        btnSync.disabled = false;
        btnSync.querySelector("i").className = "fas fa-sync-alt";
        btnSync.querySelector("span").textContent = "Atualizar Impressoras";
      }
    </script>
  </body>
</html>
