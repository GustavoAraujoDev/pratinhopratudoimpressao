<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pratinhopratudo - Agente de Impressão</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #f1f5f9; /* Tom cinza-azulado mais suave e moderno */
        color: #1e293b;
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        background: #ffffff;
        padding: 28px;
        border-radius: 20px; /* Bordas mais suaves */
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.04); /* Sombra mais sutil e realista */
        width: 100%;
        max-width: 380px;
      }
      .header {
        text-align: center;
        margin-bottom: 24px;
      }
      .header h2 {
        color: #ef4444; /* Vermelho comercial moderno equilibrado (não agressivo) */
        font-size: 20px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        letter-spacing: -0.5px;
      }
      .header p {
        font-size: 13px;
        color: #64748b;
        margin-top: 6px;
        font-weight: 400;
      }

      /* Container de Status Remodelado */
      .status-container {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .status-info h4 {
        font-size: 11px;
        text-transform: uppercase;
        color: #94a3b8;
        letter-spacing: 0.7px;
        font-weight: 600;
      }
      .status {
        font-weight: 600;
        font-size: 13px;
        margin-top: 6px;
        padding: 6px 12px;
        border-radius: 20px; /* Estilo pílula */
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      /* 🚨 CORES DE STATUS SUAVES (PREMIUM) */
      .online {
        background: #bbf7d0;
        color: #15803d;
      }
      .offline {
        background: #fee2e2;
        color: #991b1b;
      }
      .mock {
        background: #fef3c7;
        color: #92400e;
      }

      /* Bloco de Configurações / Select */
      .info-box {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        padding: 16px;
        border-radius: 14px;
        margin-bottom: 24px;
      }
      .info-box span {
        font-size: 11px;
        text-transform: uppercase;
        color: #94a3b8;
        letter-spacing: 0.7px;
        font-weight: 600;
        display: block;
        margin-bottom: 8px;
      }
      .select-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .select-wrapper i {
        position: absolute;
        left: 12px;
        color: #64748b;
        font-size: 14px;
        pointer-events: none;
      }
      select {
        width: 100%;
        padding: 10px 12px 10px 36px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        font-size: 13px;
        font-weight: 500;
        color: #334155;
        background-color: #f8fafc;
        cursor: pointer;
        transition: all 0.2s ease;
        appearance: none; /* Remove seta padrão do SO */
        -webkit-appearance: none;
      }
      /* Criando uma seta customizada elegante para o select */
      .select-wrapper::after {
        content: "\f078";
        font-family: "Font Awesome 5 Free";
        font-weight: 900;
        font-size: 10px;
        color: #64748b;
        position: absolute;
        right: 12px;
        pointer-events: none;
      }
      select:focus {
        outline: none;
        border-color: #ef4444;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
      }

      /* Botões */
      .btn {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-primary {
        background: #1e293b; /* Botão principal escuro traz seriedade e contraste ao app */
        color: #ffffff;
      }
      .btn-primary:hover {
        background: #0f172a;
      }
      .btn-secondary {
        background: #ffffff;
        color: #475569;
        border: 1px solid #cbd5e1;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .btn-secondary:hover:not(:disabled) {
        background: #f8fafc;
        border-color: #94a3b8;
        color: #1e293b;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
      }

      .footer-note {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 20px;
        text-align: center;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <h2><i class="fas fa-utensils"></i> Pratinhopratudo</h2>
        <p>Ponte de Impressão Remota USB</p>
      </div>

      <div class="status-container">
        <div class="status-info">
          <h4>Status do Agente</h4>
          <div id="status-badge" class="status offline">
            <i class="fas fa-circle-notch fa-spin"></i> Conectando...
          </div>
        </div>
        <button
          id="btn-test"
          onclick="dispararTesteFisico()"
          disabled
          class="btn btn-secondary"
          style="
            width: auto;
            margin: 0;
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 8px;
          "
        >
          <i class="fas fa-print"></i> Testar
        </button>
      </div>

      <div class="info-box">
        <span>Dispositivo de Saída</span>
        <div class="select-wrapper">
          <i class="fas fa-print"></i>
          <select
            id="select-impressoras"
            onchange="salvarImpressoraSelecionada()"
          >
            <option value="">Buscando impressoras...</option>
          </select>
        </div>
      </div>

      <button onclick="reprocurarImpressora()" class="btn btn-primary">
        <i class="fas fa-sync-alt"></i> Sincronizar Impressora
      </button>

      <p class="footer-note">
        <i class="fas fa-lock" style="margin-right: 3px"></i> Mantenha este
        agente ativo em segundo plano.
      </p>
    </div>

    <script>
      const { ipcRenderer } = require("electron");

      document.addEventListener("DOMContentLoaded", () => {
        ipcRenderer.send("buscar-lista-impressoras");
      });

      ipcRenderer.on(
        "lista-impressoras-resposta",
        (event, lista, salvaAnteriormente) => {
          const select = document.getElementById("select-impressoras");
          select.innerHTML = "";

          if (lista.length === 0) {
            select.innerHTML =
              '<option value="">Nenhuma impressora instalada</option>';
            return;
          }

          lista.forEach((imp) => {
            const option = document.createElement("option");
            option.value = imp.name;
            option.textContent = imp.name + (imp.isDefault ? " (Padrão)" : "");
            if (imp.name === salvaAnteriormente) {
              option.selected = true;
            }
            select.appendChild(option);
          });

          if (!select.value && select.options.length > 0) {
            select.selectedIndex = 0;
          }

          ipcRenderer.send("configurar-impressora-ativa", select.value);
        },
      );

      function salvarImpressoraSelecionada() {
        const nomeImpressora =
          document.getElementById("select-impressoras").value;
        ipcRenderer.send("configurar-impressora-ativa", nomeImpressora);
      }

      ipcRenderer.on("status-mudou", (event, status) => {
        const badge = document.getElementById("status-badge");
        const btnTest = document.getElementById("btn-test");

        if (status === "online") {
          badge.innerHTML =
            '<i class="fas fa-check-circle"></i> Online e Pronto';
          badge.className = "status online";
          btnTest.disabled = false;
        } else if (status === "mock") {
          badge.innerHTML = '<i class="fas fa-vial"></i> Modo Simulador';
          badge.className = "status mock";
          btnTest.disabled = false;
        } else {
          badge.innerHTML =
            '<i class="fas fa-exclamation-triangle"></i> Fora de linha';
          badge.className = "status offline";
          btnTest.disabled = true;
        }
      });

      function dispararTesteFisico() {
        ipcRenderer.send("solicitar-teste-impressao");
      }

      function reprocurarImpressora() {
        ipcRenderer.send("forcar-reconectar-usb");
      }
    </script>
  </body>
</html>
